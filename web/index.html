<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DryFour AR | HUD High-Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ui-hud">
        <div class="hud-box">
            <span class="brand">DRYFOUR // AR</span>
            <span class="separator">|</span>
            <span class="status-label">STATUS:</span>
            <span id="status" class="status-value">INICIALIZANDO...</span>
        </div>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="PESQUISAR PRODUTO (ex: carteira)..." onkeypress="handleSearchKeyPress(event)">
        <button id="search-button" onclick="performSearch()">
            <i class="fas fa-search"></i> </button>
    </div>

    <div id="controls-container">
        <div class="control-cluster d-pad">
            <button class="btn-ar up" onmousedown="move('y', 0.5)" ontouchstart="move('y', 0.5)">Y+</button>
            <div class="mid-row">
                <button class="btn-ar left" onmousedown="move('x', -0.5)" ontouchstart="move('x', -0.5)">X-</button>
                <button class="btn-ar right" onmousedown="move('x', 0.5)" ontouchstart="move('x', 0.5)">X+</button>
            </div>
            <button class="btn-ar down" onmousedown="move('y', -0.5)" ontouchstart="move('y', -0.5)">Y-</button>
        </div>

        <div class="control-cluster action-buttons">
            <div class="control-group">
                <button class="btn-ar btn-z" onmousedown="move('z', 0.5)" ontouchstart="move('z', 0.5)">Z+</button>
                <button class="btn-ar btn-z" onmousedown="move('z', -0.5)" ontouchstart="move('z', -0.5)">Z-</button>
            </div>
            <div class="control-group">
                <button class="btn-ar btn-scl" onmousedown="updateScale(1.1)" ontouchstart="updateScale(1.1)">SCL+</button>
                <button class="btn-ar btn-scl" onmousedown="updateScale(0.9)" ontouchstart="updateScale(0.9)">SCL-</button>
            </div>
            <div class="control-group">
                <button class="btn-ar btn-rot" onmousedown="rotate('y', 0.5)" ontouchstart="rotate('y', 0.5)">ROT Y</button>
            </div>
            <div class="control-group" id="mobile-only-controls">
                <button id="btn-camera" class="btn-ar btn-cam" onmousedown="toggleCamera()" ontouchstart="toggleCamera()">BACK</button>
            </div>
        </div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas-ar"></canvas>

    <script src="wasm_exec.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
